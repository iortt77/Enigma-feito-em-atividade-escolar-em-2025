<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="impossivel5.css">
  <title>Document</title>
</head>
<body>
  <div class="container">
    <h1 class="titulo">
      os videos rodando sobre escalar a torre estarão a visão do mundo de cima
      o céu estrelado do paraiso te mostrará o infemo fim da vivencia humana
      sua exencia exala por todos.
    </h1>

    <input type="text" id="senha" placeholder="Digite a senha..." />
    <button id="botao">o fim está logo ali</button>
  </div>

  <script>
    const PUZZLE_ID = 10;

    document.getElementById("botao").addEventListener("click", async function () {
      let input = document.getElementById("senha");
      let senha = input.value.trim();
      if (!senha) return;

      try {
        const form = new FormData();
        form.append('puzzle_id', PUZZLE_ID);
        form.append('answer', senha);

        const res = await fetch('../check_answer.php', {
          method: 'POST',
          body: form,
          credentials: 'same-origin'
        });

        if (!res.ok) return;
        const data = await res.json();

        if (data.ok) {
          window.location.href = "../verdadeirofinal.html";
        }
      } catch (err) {
        // Em caso de erro, não faz nada
      }
    });

    document.getElementById("senha").addEventListener("keydown", function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById("botao").click();
      }
    });
  </script>
</body>
</html>
